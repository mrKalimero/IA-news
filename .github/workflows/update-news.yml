name: Update news data

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate static news data
        run: node scripts/fetch-news.mjs

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "Update generated news data"
          file_pattern: public/data/news.json
